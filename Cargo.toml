[workspace]
resolver = "2"
members = [
    "crates/yororen-ui",
    "crates/yororen-ui-core",
    "crates/yororen-ui-theme-system",
    "crates/yororen-ui-demos/counter",
    "crates/yororen-ui-demos/todolist",
    "crates/yororen-ui-demos/file_browser",
    "crates/yororen-ui-demos/popover_placement",
    "crates/yororen-ui-demos/toast_notification",
    "crates/yororen-ui-demos/tree_expanded",
]
exclude = [
    "crates/yororen-ui-demos/*/target",
]

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/MeowLynxSea/yororen-ui"
